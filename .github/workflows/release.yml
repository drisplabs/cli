name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Always keep the release PR current. This job only opens/updates the
  # release PR — it never publishes — so it must NOT be gated on CI. Gating
  # it meant any red push to main left the release PR stale until the next
  # fully-green push. The PR's own checks (ci.yml on pull_request) and
  # prepublishOnly at publish time are the real gates.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # PRs opened with the default GITHUB_TOKEN do NOT trigger the
          # pull_request CI workflow (GitHub blocks recursive triggers), so
          # the release PR shows no checks. Set a RELEASE_PLEASE_TOKEN secret
          # (a PAT with contents+pull-requests write, or a GitHub App token)
          # to get checks on the release PR. Falls back safely if unset.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [release-please, ci]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
